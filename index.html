<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة نورس الرقمية - تعديل المتاجر فقط</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=300;400;600;700;800;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }

<body class="text-slate-800 antialiased min-h-screen pb-36">

    <header class="sticky top-0 z-40 bg-white border-b border-slate-100 shadow-xs">
        <div class="max-w-md mx-auto px-5 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <button id="back-to-stores-btn" onclick="backToStores()" class="hidden w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-700 active:scale-95 transition-all">
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
                <div id="header-logo" class="w-10 h-10 rounded-xl bg-orange-500 flex items-center justify-center shadow-md shadow-orange-500/20">
                    <i class="fa-solid fa-paper-plane text-white text-sm"></i>
                </div>
                <div>
                    <h1 id="app-title" class="font-black text-sm text-slate-900 leading-none">تطبيق نورس</h1>
                    <p id="app-subtitle" class="text-[10px] text-slate-400 mt-1 font-bold">توصيل مشترك ذكي</p>
                </div>
            </div>

            <div class="relative flex-1 max-w-[180px]">
                <span class="absolute inset-y-0 right-3 flex items-center text-slate-400">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input id="global-search-input" oninput="handleGlobalSearch()" type="text" placeholder="ابحث..." class="w-full h-10 bg-slate-50 border border-slate-100 rounded-xl pr-9 pl-4 text-xs font-bold focus:outline-none focus:border-orange-500 focus:bg-white transition-all">
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-5 py-6">
        
        <section id="stores-section" class="space-y-5">
            <div class="flex items-center justify-between px-1">
                <h2 class="text-sm font-black text-slate-900 flex items-center gap-1.5">
                    <i class="fa-solid fa-star text-amber-500 text-xs"></i> المتاجر المفتوحة في النجف
                </h2>
                <span class="text-[10px] font-black bg-orange-50 text-orange-600 px-2.5 py-1 rounded-xl">دمج متجرين 🎯</span>
            </div>
            
            <div id="stores" class="space-y-5">
                <div class="text-center py-20 text-slate-400">
                    <i class="fa-solid fa-circle-notch animate-spin text-3xl mb-3 text-orange-500"></i>
                    <p class="text-xs font-bold">جاري تحديث المتاجر...</p>
                </div>
            </div>
        </section>

        <section id="products-section" class="hidden space-y-4">
            <div class="bg-slate-900 p-4 rounded-2xl text-white flex justify-between items-center">
                <div>
                    <h2 id="selected-store-name" class="font-black text-sm">اسم المتجر</h2>
                    <p class="text-[10px] text-slate-400 mt-0.5">توصيل سريع مشترك</p>
                </div>
                <button onclick="backToStores()" class="bg-white/10 px-3 py-1.5 rounded-lg text-[11px] font-bold">رجوع</button>
            </div>

            <div id="categories-wrapper" class="hidden">
                <div id="categories-container" class="flex gap-2 overflow-x-auto pb-2 scrollbar-none"></div>
            </div>

            <div id="products" class="grid grid-cols-2 gap-3"></div>
        </section>
    </main>

    <div id="floating-cart-btn" class="hidden fixed bottom-6 inset-x-5 max-w-md mx-auto z-40">
        <button onclick="openCartModal()" class="w-full flex items-center justify-between bg-orange-500 text-white px-5 h-14 rounded-xl shadow-lg shadow-orange-500/20 font-bold text-xs">
            <div class="flex items-center gap-2">
                <div class="bg-white text-orange-600 w-6 h-6 rounded-lg font-black flex items-center justify-center text-xs shadow-xs" id="cart-floating-badge">0</div>
                <span class="font-black">عرض السلة المشتركة</span>
            </div>
            <i class="fa-solid fa-basket-shopping text-sm"></i>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-50 flex flex-col justify-end opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="cart-modal-container" class="w-full max-w-md mx-auto bg-white rounded-t-3xl flex flex-col max-h-[80vh] translate-y-full transition-transform duration-300">
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto my-3"></div>
            <div class="px-5 pb-3 flex justify-between items-center border-b border-slate-100">
                <h2 class="font-black text-sm text-slate-900">سلتك الحالية</h2>
                <button onclick="closeCartModal()" class="text-slate-400 text-sm"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-5 space-y-4 scrollbar-none">
                <div id="cart-items-by-store" class="space-y-3"></div>

                <div class="rounded-xl bg-slate-50 p-4 space-y-2.5 text-xs">
                    <div class="flex justify-between text-slate-500 font-bold">
                        <span>مجموع الوجبات:</span>
                        <span class="font-black text-slate-800"><span id="subtotal-price">0</span> د.ع</span>
                    </div>
                    <div class="flex justify-between text-slate-500 font-bold">
                        <span>أجور التوصيل الجغرافي:</span>
                        <span id="delivery-fee-display" class="font-black text-orange-500">حدد موقعك 📍</span>
                    </div>
                    <div id="distance-info" class="text-[11px] text-slate-600 hidden bg-white p-3 rounded-lg border border-slate-100"></div>
                    <div class="flex justify-between items-center text-sm font-black text-slate-900 pt-3 border-t border-slate-200">
                        <span>الإجمالي الكلي:</span>
                        <span class="text-orange-500"><span id="total-price">0</span> د.ع</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <input id="order-notes" type="text" placeholder="أي ملاحظات للكابتن..." class="w-full h-11 border border-slate-200 rounded-xl px-4 text-xs font-bold bg-slate-50 focus:bg-white focus:outline-none">
                    <button type="button" onclick="requestUserLocation()" id="location-btn" class="w-full h-11 flex items-center justify-center gap-2 bg-slate-900 text-white font-black rounded-xl text-xs">
                        <i class="fa-solid fa-location-crosshairs text-orange-500"></i>
                        <span id="location-btn-text">مشاركة الموقع الحالي وتثبيته</span>
                    </button>
                </div>
            </div>

            <div class="p-4 border-t border-slate-100">
                <button onclick="checkout()" class="w-full h-11 rounded-xl bg-orange-500 text-white font-black text-xs">
                    إرسال الطلب فوراً
                </button>
            </div>
        </div>
    </div>

    <div id="media-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 hidden" onclick="closeMediaModal()">
        <div class="max-w-xs w-full bg-black rounded-xl overflow-hidden" onclick="event.stopPropagation()">
            <div id="modal-content" class="w-full aspect-square flex items-center justify-center"></div>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://lfpzrppdaoiedwabpqjl.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcHpycHBkYW9pZWR3YWJwcWpsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDMzODcwOCwiZXhwIjoyMDk1OTE0NzA4fQ.EkgD-Zz4HHABNLOYtNxJr6U2BeolQhIOojEQiiVStaQ";
        const botToken = "8579415183:AAFDcnlUeo7iUABt5vOW7yGF5dny8FiN4bM"; 

        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let stores = []; let products = []; let cart = [];
        let selectedMerchant = null; let selectedMerchantData = null; 
        let customerLat = null; let customerLng = null;
        let currentDeliveryFee = 0; let selectedCategory = "الكل"; 

        const tg = window.Telegram?.WebApp;
        if(tg) tg.expand();

        const customerTelegramId = tg?.initDataUnsafe?.user?.id || 5503702576; 
        const customerPhone = "9647847121378"; 

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        async function getTelegramImageUrl(fileId) {
            if (!fileId) return null;
            try {
                let response = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
                let json = await response.json();
                if(json.ok) return `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
            } catch (e) { console.error(e); }
            return null; 
        }

        async function loadStores(){
            let { data } = await db.from('merchants').select('*').eq('is_open', true);
            stores = data || [];
            displayStores(stores);
        }

        // هنا التعديل: المتاجر تظهر بشكل كروت عريضة فخمة مع زوايا دائرية جميلة وصورة واضحة وكبيرة
        async function displayStores(storesList) {
            const container = document.getElementById('stores');
            if(storesList.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500 text-xs font-bold">لا تـوجد متاجر مفتوحة حالياً.</div>`;
                return;
            }

            container.innerHTML = ''; 
            for (let s of storesList) {
                const imageUrl = s.store_image_file_id ? await getTelegramImageUrl(s.store_image_file_id) : null;
                const imageHtml = imageUrl 
                    ? `<img src="${imageUrl}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105" alt="${s.store_name}">`
                    : `<div class="w-full h-full text-orange-500 flex items-center justify-center text-2xl bg-orange-50"><i class="fa-solid fa-utensils"></i></div>`;

                container.innerHTML += `
                <div onclick="openStore('${s.id}','${s.store_name}')" class="group overflow-hidden rounded-[2rem] bg-white border border-slate-100 cursor-pointer transition-all flex flex-col store-card-shadow">
                    <div class="relative w-full aspect-[16/9] bg-slate-50 overflow-hidden">
                        ${imageHtml}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
                    </div>
                    <div class="p-5 flex items-center justify-between gap-4">
                        <div>
                            <h3 class="font-black text-slate-900 text-sm">${s.store_name}</h3>
                            <p class="text-xs text-slate-400 font-semibold mt-0.5"><i class="fa-solid fa-motorcycle text-orange-400 mr-0.5"></i> كابتن نورس • توصيل سريع</p>
                        </div>
                        <div class="w-9 h-9 rounded-xl bg-slate-50 text-slate-500 flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition-all shadow-2xs">
                            <i class="fa-solid fa-chevron-left text-xs"></i>
                        </div>
                    </div>
                </div>`;
            }
        }

        function backToStores() {
            selectedMerchant = null; selectedMerchantData = null;
            document.getElementById('products-section').classList.add('hidden');
            document.getElementById('back-to-stores-btn').classList.add('hidden');
            document.getElementById('stores-section').classList.remove('hidden');
            document.getElementById('header-logo').classList.remove('hidden');
            document.getElementById('app-title').innerText = "تطبيق نورس";
            document.getElementById('app-subtitle').innerText = "توصيل مشترك ذكي";
            document.getElementById('global-search-input').value = '';
            document.getElementById('global-search-input').placeholder = "ابحث...";
            displayStores(stores);
            updateFloatingCartButtonVisibility();
        }

        function handleGlobalSearch() {
            const query = document.getElementById('global-search-input').value.trim().toLowerCase();
            if (selectedMerchant === null) {
                const filteredStores = stores.filter(s => s.store_name.toLowerCase().includes(query));
                displayStores(filteredStores);
            } else {
                filterProducts(query);
            }
        }

        async function openStore(id, storeName){
            selectedMerchant = id;
            selectedMerchantData = stores.find(s => s.id === id); 
            selectedCategory = "الكل"; 
            document.getElementById('global-search-input').value = ''; 

            document.getElementById('stores-section').classList.add('hidden');
            document.getElementById('header-logo').classList.add('hidden');
            document.getElementById('products-section').classList.remove('hidden');
            document.getElementById('back-to-stores-btn').classList.remove('hidden');
            
            document.getElementById('selected-store-name').innerText = storeName;
            document.getElementById('app-title').innerText = storeName;
            document.getElementById('app-subtitle').innerText = "قائمة المواد";
            
            updateFloatingCartButtonVisibility();

            const productsContainer = document.getElementById('products');
            productsContainer.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-xs font-bold"><i class="fa-solid fa-circle-notch animate-spin text-orange-500 mb-2"></i> جاري تحميل القائمة...</div>`;

            let { data } = await db.from('products').select('*').eq('merchant_id', id).eq('is_available', true);
            products = data || [];

            if(products.length === 0) {
                document.getElementById('categories-wrapper').classList.add('hidden');
                productsContainer.innerHTML = `<div class="col-span-full py-12 text-center text-slate-400 text-xs font-bold">لا توجد مواد متوفرة حالياً.</div>`;
                return;
            }

            document.getElementById('categories-wrapper').classList.remove('hidden');
            generateCategoryTabs();
            displayProducts(products);
        }

        function generateCategoryTabs() {
            const container = document.getElementById('categories-container');
            const categories = ["الكل", ...new Set(products.map(p => p.category).filter(Boolean))];
            container.innerHTML = '';
            categories.forEach(cat => {
                const isActive = cat === selectedCategory;
                const btnClass = isActive 
                    ? "bg-orange-500 text-white font-black px-3.5 py-1.5 rounded-lg text-xs whitespace-nowrap"
                    : "bg-slate-100 text-slate-600 font-bold px-3.5 py-1.5 rounded-lg text-xs whitespace-nowrap";
                container.innerHTML += `<button onclick="selectCategory('${cat}')" class="${btnClass}">${cat}</button>`;
            });
        }

        function selectCategory(category) {
            selectedCategory = category;
            generateCategoryTabs();
            filterProducts(document.getElementById('global-search-input').value.trim().toLowerCase());
        }

        function filterProducts(searchQuery = '') {
            const filtered = products.filter(p => {
                const matchesCategory = (selectedCategory === "الكل" || p.category === selectedCategory);
                const matchesSearch = (!searchQuery || p.name.toLowerCase().includes(searchQuery));
                return matchesCategory && matchesSearch;
            });
            displayProducts(filtered);
        }

        // تم إرجاع عرض المنتجات القديم كما كان (كروت صغيرة بجانب بعضها)
        async function displayProducts(productsList) {
            const productsContainer = document.getElementById('products');
            if(productsList.length === 0) {
                productsContainer.innerHTML = `<div class="col-span-full py-12 text-center text-slate-400 text-xs font-bold">لا توجد مواد مطابقة.</div>`;
                return;
            }

            productsContainer.innerHTML = ''; 
            for (let p of productsList) {
                let imgHtml = '';
                if (p.image_file_id) {
                    const imageUrl = await getTelegramImageUrl(p.image_file_id);
                    if (imageUrl) {
                        imgHtml = `<img src="${imageUrl}" class="w-full h-24 object-cover rounded-xl cursor-pointer" onclick="openMediaModal('${imageUrl}')">`;
                    }
                }
                if (!imgHtml && p.video_file_id) {
                    const videoUrl = await getTelegramImageUrl(p.video_file_id);
                    if (videoUrl) {
                        imgHtml = `<div class="w-full h-24 bg-slate-950 rounded-xl flex items-center justify-center text-white cursor-pointer" onclick="openVideoModal('${videoUrl}')"><i class="fa-solid fa-play"></i></div>`;
                    }
                }
                if (!imgHtml) {
                    imgHtml = `<div class="w-full h-24 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300 text-xl"><i class="fa-solid fa-bowl-food"></i></div>`;
                }

                productsContainer.innerHTML += `
                <div class="bg-white border border-slate-100 rounded-2xl p-2.5 flex flex-col justify-between">
                    <div>
                        ${imgHtml}
                        <h4 class="font-bold text-xs text-slate-900 mt-2 line-clamp-1">${p.name}</h4>
                        <p class="text-[11px] text-orange-500 font-black mt-0.5">${p.price.toLocaleString()} د.ع</p>
                    </div>
                    <button onclick="addToCart('${p.id}','${p.name}',${p.price}, '${p.merchant_id}')" class="w-full h-8 mt-2.5 rounded-lg bg-orange-500 text-white text-[11px] font-black flex items-center justify-center gap-1 active:scale-95 transition-all">
                        إضافة <i class="fa-solid fa-plus text-[9px]"></i>
                    </button>
                </div>`;
            }
        }

        function addToCart(id, name, price, merchantId){
            let storeData = stores.find(s => s.id === merchantId);
            let storeName = storeData ? storeData.store_name : "متجر مجهول";
            const currentUniqueStores = [...new Set(cart.map(item => item.merchant_id))];

            if (currentUniqueStores.length >= 2 && !currentUniqueStores.includes(merchantId)) {
                alert("⚠️ عذراً، يمكنك الطلب من متجرين كحد أقصى في الفاتورة المشتركة.");
                return;
            }

            if (currentUniqueStores.length === 1 && !currentUniqueStores.includes(merchantId)) {
                let firstStore = stores.find(s => s.id === currentUniqueStores[0]);
                let secondStore = storeData;

                if (firstStore && secondStore) {
                    let lat1 = firstStore.lat || firstStore.latitude; let lon1 = firstStore.lng || firstStore.longitude;
                    let lat2 = secondStore.lat || secondStore.latitude; let lon2 = secondStore.lng || secondStore.longitude;

                    if (lat1 && lon1 && lat2 && lon2) {
                        let distanceBetweenStores = calculateHaversineDistance(lat1, lon1, lat2, lon2);
                        if (distanceBetweenStores > 1.0) {
                            alert(`⚠️ تعذر الدمج بسبب بعد المتاجر عن بعضها البعض لحفظ الجودة.`);
                            return;
                        }
                    }
                }
            }

            let item = cart.find(x => x.product_id === id);
            if(item) {
                item.qty++; item.total = item.price * item.qty;
            } else {
                cart.push({product_id: id, name, price, qty: 1, total: price, merchant_id: merchantId, merchant_name: storeName});
            }
            renderCart();
            updateFloatingCartButtonVisibility();
        }

        function changeQty(id, change) {
            let item = cart.find(x => x.product_id === id);
            if(item) {
                item.qty += change; item.total = item.price * item.qty;
                if(item.qty <= 0) cart = cart.filter(x => x.product_id !== id);
            }
            renderCart();
            updateFloatingCartButtonVisibility();
        }

        function updateFloatingCartButtonVisibility() {
            const btn = document.getElementById('floating-cart-btn');
            const totalItems = cart.reduce((a, b) => a + b.qty, 0);
            if(totalItems > 0) btn.classList.remove('hidden'); else btn.classList.add('hidden');
        }

        function renderCart(){
            const cartContainer = document.getElementById('cart-items-by-store');
            const totalItems = cart.reduce((a, b) => a + b.qty, 0);
            const subtotalPrice = cart.reduce((a, b) => a + b.price * b.qty, 0);

            document.getElementById('subtotal-price').innerText = subtotalPrice.toLocaleString();
            document.getElementById('total-price').innerText = (subtotalPrice + currentDeliveryFee).toLocaleString();
            document.getElementById("cart-floating-badge").innerText = totalItems;

            if(cart.length === 0) {
                cartContainer.innerHTML = `<div class="text-center py-6 text-slate-400 text-xs font-bold">السلة فارغة.</div>`;
                return;
            }

            const groupedCart = {};
            cart.forEach(item => {
                if(!groupedCart[item.merchant_id]) {
                    groupedCart[item.merchant_id] = { storeName: item.merchant_name, items: [] };
                }
                groupedCart[item.merchant_id].items.push(item);
            });

            cartContainer.innerHTML = '';
            for(let mId in groupedCart) {
                let storeGroup = groupedCart[mId];
                let blockHtml = `
                <div class="border border-slate-100 rounded-xl bg-slate-50 p-3 space-y-2">
                    <div class="text-xs font-black text-slate-800 pb-1 border-b border-slate-200/40">🛒 من: ${storeGroup.storeName}</div>
                    <div class="space-y-2">`;

                storeGroup.items.forEach(c => {
                    blockHtml += `
                    <div class="flex items-center justify-between bg-white p-2 rounded-lg border border-slate-100">
                        <div class="min-w-0 flex-1 pl-2">
                            <div class="font-bold text-slate-800 text-xs truncate">${c.name}</div>
                            <div class="text-[11px] text-orange-500 font-black mt-0.5">${c.total.toLocaleString()} د.ع</div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <button onclick="changeQty('${c.product_id}',-1)" class="w-5 h-5 rounded bg-slate-100 flex items-center justify-center text-slate-600"><i class="fa-solid fa-minus text-[8px]"></i></button>
                            <div class="font-black text-xs w-4 text-center">${c.qty}</div>
                            <button onclick="changeQty('${c.product_id}',1)" class="w-5 h-5 rounded bg-orange-500 text-white flex items-center justify-center"><i class="fa-solid fa-plus text-[8px]"></i></button>
                        </div>
                    </div>`;
                });

                blockHtml += `</div></div>`;
                cartContainer.innerHTML += blockHtml;
            }
        }

        function openCartModal() {
            renderCart();
            if(customerLat && customerLng) { processGeographicalDelivery(); }
            const modal = document.getElementById('cart-modal');
            const container = document.getElementById('cart-modal-container');
            modal.classList.remove('pointer-events-none', 'opacity-0');
            container.classList.remove('translate-y-full');
        }

        function closeCartModal() {
            const modal = document.getElementById('cart-modal');
            const container = document.getElementById('cart-modal-container');
            modal.classList.add('opacity-0', 'pointer-events-none');
            container.classList.add('translate-y-full');
        }

        function openMediaModal(url) {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `<img src="${url}" class="w-full h-full object-contain rounded-xl">`;
            modal.classList.remove('hidden');
        }

        function openVideoModal(url) {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `<video src="${url}" class="w-full h-full object-contain rounded-xl" controls autoplay></video>`;
            modal.classList.remove('hidden');
        }

        function closeMediaModal() {
            document.getElementById('media-modal').classList.add('hidden');
            document.getElementById('modal-content').innerHTML = '';
        }

        function getFeeByKilometers(km) {
            if (km <= 2) return 2000;   
            if (km <= 4) return 3000;   
            if (km <= 8) return 4000;  
            return 5000;                
        }

        function processGeographicalDelivery() {
            if (!customerLat || !customerLng || cart.length === 0) return;

            const uniqueMerchantIds = [...new Set(cart.map(item => item.merchant_id))];
            let maxDistance = 0; let distanceReportHtml = '';

            uniqueMerchantIds.forEach(mId => {
                let merchant = stores.find(s => s.id === mId);
                if(merchant) {
                    let sLat = merchant.lat || merchant.latitude; let sLng = merchant.lng || merchant.longitude;
                    if(sLat && sLng) {
                        let dist = calculateHaversineDistance(customerLat, customerLng, sLat, sLng);
                        if(dist > maxDistance) maxDistance = dist;
                        distanceReportHtml += `<div>📍 متجر ${merchant.store_name}: يبعد ${dist.toFixed(1)} كم</div>`;
                    }
                }
            });

            let baseFee = getFeeByKilometers(maxDistance);
            let extraStoresCount = uniqueMerchantIds.length - 1;
            currentDeliveryFee = baseFee + (extraStoresCount * 1500);

            document.getElementById('delivery-fee-display').innerText = `${currentDeliveryFee.toLocaleString()} د.ع`;
            
            const distanceInfo = document.getElementById('distance-info');
            distanceInfo.classList.remove('hidden');
            distanceInfo.innerHTML = distanceReportHtml;
            renderCart(); 
        }

        function requestUserLocation() {
            document.getElementById('location-btn-text').innerText = "جاري التحديد...";
            if (tg?.LocationManager?.isInited) {
                tg.LocationManager.getLocation(function(data) {
                    if (data?.latitude) {
                        customerLat = data.latitude; customerLng = data.longitude;
                        updateLocationSuccess();
                    } else { fallbackToBrowserGeolocation(); }
                });
            } else { fallbackToBrowserGeolocation(); }
        }

        function fallbackToBrowserGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    customerLat = pos.coords.latitude; customerLng = pos.coords.longitude;
                    updateLocationSuccess();
                }, () => {
                    document.getElementById('location-btn-text').innerText = "فشل تحديد موقع الـ GPS";
                });
            }
        }

        function updateLocationSuccess() {
            document.getElementById('location-btn').className = "w-full flex items-center justify-center gap-2 bg-emerald-50 text-emerald-700 font-black py-3 px-4 rounded-xl text-xs border border-emerald-200";
            document.getElementById('location-btn-text').innerText = `تم حفظ موقعك بنجاح!`;
            processGeographicalDelivery();
        }

        async function checkout(){
            if(cart.length === 0) return;
            if(!customerLat || !customerLng) return alert("⚠️ يرجى مشاركة الموقع أولاً.");

            const subtotalPrice = cart.reduce((a, b) => a + b.price * b.qty, 0);
            const generatedOrderNumber = Math.floor(100000 + Math.random() * 900000); 
            const uniqueMerchantIds = [...new Set(cart.map(item => item.merchant_id))];

            const newOrder = {
                merchant_id: uniqueMerchantIds[0], 
                customer_telegram_id: customerTelegramId,
                customer_phone: customerPhone,
                address: `http://maps.google.com/?q=${customerLat},${customerLng}`,
                customer_lat: customerLat, customer_lng: customerLng,
                total_amount: subtotalPrice + currentDeliveryFee, 
                delivery_fee: currentDeliveryFee, 
                order_items: JSON.stringify(cart), 
                notes: document.getElementById('order-notes').value || "",
                status: "pending", order_number: generatedOrderNumber
            };

            try {
                let { error } = await db.from('orders').insert([newOrder]);
                if (error) throw error;
                alert(`🎉 تم إرسال طلبك بنجاح! رقم الفاتورة: ${generatedOrderNumber}`);
                cart = []; currentDeliveryFee = 0; closeCartModal(); backToStores(); renderCart();
                if(tg) tg.close();
            } catch (err) {
                alert("❌ حدث خطأ أثناء معالجة الفاتورة.");
            }
        }

        loadStores();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

<body class="text-slate-800 antialiased min-h-screen pb-32">

    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-slate-100 shadow-xs">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-2.5">
                <button id="back-to-stores-btn" onclick="backToStores()" class="hidden w-9 h-9 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-700 active:scale-95 transition-transform">

                </button>
                <div id="header-logo" class="w-9 h-9 rounded-xl bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-md shadow-orange-500/20">

                </div>
                <div>
                    <h1 id="app-title" class="font-black text-xs leading-none text-slate-900">منصة نورس</h1>
                    <p id="app-subtitle" class="text-[9px] text-slate-400 mt-0.5 font-bold">التوصيل المزدوج المقيد</p>

            <div class="relative flex-1 max-w-xs">

                <input id="global-search-input" oninput="handleGlobalSearch()" type="text" placeholder="ابحث عن متاجر أو وجبات..." class="w-full h-10 bg-slate-50 border border-slate-100 rounded-xl pr-9 pl-4 text-[11px] font-bold focus:outline-none focus:border-orange-500 focus:bg-white transition-all">

    <main class="max-w-md mx-auto px-4 py-5">
        
        <section id="stores-section" class="space-y-4">
            <div class="flex items-center justify-between px-0.5">
                <h2 class="text-xs font-black text-slate-900 tracking-wide flex items-center gap-1">
                    <i class="fa-solid fa-fire text-orange-500 text-xs"></i> المتاجر النشطة حالياً
                </h2>
                <span class="text-[9px] font-black bg-orange-50 text-orange-600 px-2 py-0.5 rounded-lg">متجرين كحد أقصى</span>
            </div>
            <div id="stores" class="space-y-4">
                <div class="text-center py-12 text-slate-400">
                    <i class="fa-solid fa-spinner animate-spin text-2xl mb-2 text-orange-500"></i>
                    <p class="text-xs font-bold">جاري جلب المتاجر المفتوحة في النجف...</p>
                </div>
            </div>

        <section id="products-section" class="hidden space-y-4">
            <div class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-slate-900 to-slate-800 p-5 text-white premium-shadow">

                <h2 id="selected-store-name" class="text-base font-black mt-0.5">اسم المتجر</h2>
                <button onclick="backToStores()" class="absolute left-4 bottom-4 bg-white/10 hover:bg-white/25 px-3 py-1.5 rounded-xl text-[10px] font-black transition backdrop-blur-md">

            <div id="categories-wrapper" class="bg-white p-2 rounded-2xl border border-slate-100 hidden shadow-xs">

    <div id="floating-cart-btn" class="hidden fixed bottom-6 inset-x-4 max-w-md mx-auto z-40">
        <button onclick="openCartModal()" class="w-full flex items-center justify-between bg-gradient-to-r from-orange-500 to-red-500 text-white px-5 h-14 rounded-2xl shadow-xl active:scale-[0.98] transition-transform font-bold text-xs cursor-pointer">
            <div class="flex items-center gap-2.5">
                <div class="bg-white text-orange-600 w-6 h-6 rounded-xl font-black flex items-center justify-center text-xs shadow-xs" id="cart-floating-badge">0</div>
                <span class="font-black">مراجعة حساب السلة المزدوجة</span>
            </div>
            <i class="fa-solid fa-cart-shopping text-sm"></i>
        </button>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 flex flex-col justify-end opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-xs">
        <div id="cart-modal-container" class="w-full max-w-md mx-auto bg-white rounded-t-[2rem] shadow-2xl flex flex-col max-h-[85vh] translate-y-full transition-transform duration-300">
            
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto my-3"></div>
            
            <div class="px-5 pb-3 flex justify-between items-center border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-basket-shopping text-orange-500"></i>
                    <h2 class="font-black text-xs text-slate-900">سلة المشتريات الذكية</h2>
                </div>
                <button onclick="closeCartModal()" class="w-7 h-7 rounded-full bg-slate-50 flex items-center justify-center text-slate-500"><i class="fa-solid fa-xmark text-xs"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <div id="cart-items-by-store" class="space-y-3"></div>

                <div class="rounded-2xl bg-slate-50 p-4 space-y-3 text-xs border border-slate-100">
                    <div class="flex justify-between text-slate-500 font-bold">
                        <span>مجموع الوجبات والمواد:</span>
                        <span class="font-black text-slate-800"><span id="subtotal-price">0</span> د.ع</span>

                    <div class="flex justify-between text-slate-500 font-bold items-center">
                        <span>أجور توصيل كابتن نورس:</span>
                        <span id="delivery-fee-display" class="font-black text-orange-500 bg-orange-50 px-2 py-0.5 rounded-lg">قفل الـ GPS للحساب 📍</span>
                    </div>
                    <div id="distance-info" class="text-[10px] text-emerald-700 font-bold hidden bg-emerald-50 p-3 rounded-xl border border-emerald-100 space-y-1"></div>
                    <div class="flex justify-between items-center text-xs font-black text-slate-900 pt-2.5 border-t border-slate-200">
                        <span>المجموع النهائي الكلي للفاتورة:</span>
                        <span class="text-orange-600 text-base font-black"><span id="total-price">0</span> د.ع</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <input id="order-notes" type="text" placeholder="أي تعليمات؟ (مثال: حار، التوصيل معاً)..." class="w-full h-11 border border-slate-200 rounded-xl px-3.5 text-xs font-bold bg-slate-50 focus:bg-white focus:outline-none focus:border-orange-500">
                    <button type="button" onclick="requestUserLocation()" id="location-btn" class="w-full h-11 flex items-center justify-center gap-2 bg-slate-950 text-white font-black rounded-xl text-xs active:scale-95 transition-transform cursor-pointer">
                        <i class="fa-solid fa-location-crosshairs text-orange-500 text-xs animate-pulse"></i>
                        <span id="location-btn-text">مشاركة موقع التسليم وتثبيت العنوان الفعلي</span>
                    </button>
                </div>
            </div>

            <div class="p-4 border-t border-slate-100 bg-slate-50 rounded-t-xl">
                <button onclick="checkout()" class="w-full h-11 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-black shadow-md transition text-xs cursor-pointer">
                    تأكيد وإرسال الفاتورة المزدوجة
                </button>
            </div>
        </div>
    </div>

    <div id="media-modal" class="fixed inset-0 bg-slate-950/90 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300 shadow-2xl" onclick="closeMediaModal()">
        <div class="relative max-w-sm w-full bg-black rounded-3xl overflow-hidden shadow-2xl border border-slate-800" onclick="event.stopPropagation()">
            <button onclick="closeMediaModal()" class="absolute top-4 left-4 z-50 w-8 h-8 rounded-full bg-black/40 text-white hover:bg-black/60 flex items-center justify-center cursor-pointer transition">
                <i class="fa-solid fa-xmark text-xs"></i>
            </button>
            <div id="modal-content" class="w-full aspect-square flex items-center justify-center bg-zinc-950"></div>
        </div>
    </div>

    <script>
        // =====================
        // 1. CONFIGURATION
        // =====================
        const supabaseUrl = "https://lfpzrppdaoiedwabpqjl.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcHpycHBkYW9pZWR3YWJwcWpsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDMzODcwOCwiZXhwIjoyMDk1OTE0NzA4fQ.EkgD-Zz4HHABNLOYtNxJr6U2BeolQhIOojEQiiVStaQ";
        const botToken = "8579415183:AAFDcnlUeo7iUABt5vOW7yGF5dny8FiN4bM"; 

        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let stores = []; let products = []; let cart = [];
        let selectedMerchant = null; let selectedMerchantData = null; 
        let customerLat = null; let customerLng = null;
        let currentDeliveryFee = 0; let selectedCategory = "الكل"; 

        const tg = window.Telegram?.WebApp;
        if(tg) tg.expand();

        const customerTelegramId = tg?.initDataUnsafe?.user?.id || 5503702576; 
        const customerPhone = "9647847121378"; 

        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        async function getTelegramImageUrl(fileId) {
            if (!fileId) return null;
            try {
                let response = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
                let json = await response.json();
                if(json.ok) return `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
            } catch (e) { console.error(e); }
            return null; 
        }

        // =====================
        // 4. LOAD STORES
        // =====================
        async function loadStores(){
            let { data } = await db.from('merchants').select('*').eq('is_open', true);
            stores = data || [];
            displayStores(stores);
        }

        async function displayStores(storesList) {
            const container = document.getElementById('stores');
            if(storesList.length === 0) {
                container.innerHTML = `<div class="text-center py-6 text-gray-500 text-xs">لا تـوجد متاجر مفتوحة حالياً.</div>`;
                return;
            }

            container.innerHTML = ''; 
            for (let s of storesList) {
                const imageUrl = s.store_image_file_id ? await getTelegramImageUrl(s.store_image_file_id) : null;
                const imageHtml = imageUrl 
                    ? `<img src="${imageUrl}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105" alt="${s.store_name}">`
                    : `<div class="w-full h-full text-orange-500 flex items-center justify-center text-2xl bg-orange-50"><i class="fa-solid fa-utensils"></i></div>`;

                container.innerHTML += `
                <div onclick="openStore('${s.id}','${s.store_name}')" class="group overflow-hidden rounded-2xl bg-white border border-slate-150/60 cursor-pointer transition-all duration-300 hover:border-orange-400 p-2 flex items-center gap-3 shadow-xs">
                    <div class="relative w-16 h-16 rounded-xl overflow-hidden bg-slate-50 shrink-0">${imageHtml}</div>
                    <div class="flex-1 min-w-0 flex items-center justify-between">
                        <div>
                            <h3 class="font-black text-slate-800 text-xs line-clamp-1">${s.store_name}</h3>
                            <p class="text-[10px] text-slate-400 font-bold mt-0.5">⏱️ 20-35 دقيقة • متجر نشط</p>
                        </div>
                        <div class="w-7 h-7 rounded-lg bg-orange-50 text-orange-500 flex items-center justify-center group-hover:bg-orange-500 group-hover:text-white transition">
                            <i class="fa-solid fa-chevron-left text-[9px]"></i>
                        </div>
                    </div>
                </div>`;
            }
        }

        function backToStores() {
            selectedMerchant = null; selectedMerchantData = null;
            document.getElementById('products-section').classList.add('hidden');
            document.getElementById('back-to-stores-btn').classList.add('hidden');
            document.getElementById('stores-section').classList.remove('hidden');
            document.getElementById('header-logo').classList.remove('hidden');
            document.getElementById('app-title').innerText = "منصة نورس";
            document.getElementById('app-subtitle').innerText = "التوصيل الإلكتروني";
            document.getElementById('global-search-input').value = '';
            document.getElementById('global-search-input').placeholder = "ابحث عن متاجر أو منتجات...";
            displayStores(stores);
            updateFloatingCartButtonVisibility();
        }

        function handleGlobalSearch() {
            const query = document.getElementById('global-search-input').value.trim().toLowerCase();
            if (selectedMerchant === null) {
                const filteredStores = stores.filter(s => s.store_name.toLowerCase().includes(query));
                displayStores(filteredStores);
            } else {
                filterProducts(query);
            }
        }

        // =====================
        // 5. LOAD PRODUCTS & MEDIA
        // =====================
        async function openStore(id, storeName){
            selectedMerchant = id;
            selectedMerchantData = stores.find(s => s.id === id); 
            selectedCategory = "الكل"; 
            document.getElementById('global-search-input').value = ''; 
            document.getElementById('global-search-input').placeholder = "ابحث في قائمة وجبات هذا المتجر...";

            document.getElementById('stores-section').classList.add('hidden');
            document.getElementById('header-logo').classList.add('hidden');
            document.getElementById('products-section').classList.remove('hidden');
            document.getElementById('back-to-stores-btn').classList.remove('hidden');
            
            document.getElementById('selected-store-name').innerText = storeName;
            document.getElementById('app-title').innerText = storeName;
            document.getElementById('app-subtitle').innerText = "قائمة المواد الطازجة";
            
            updateFloatingCartButtonVisibility();

            const productsContainer = document.getElementById('products');
            productsContainer.innerHTML = `<div class="col-span-full text-center py-8 text-gray-400 text-xs"><i class="fa-solid fa-spinner animate-spin text-orange-500"></i> جاري تنسيق الميديا والمنيو...</div>`;

            let { data } = await db.from('products').select('*').eq('merchant_id', id).eq('is_available', true);
            products = data || [];

            if(products.length === 0) {
                document.getElementById('categories-wrapper').classList.add('hidden');
                productsContainer.innerHTML = `<div class="col-span-full py-12 text-center text-gray-500 text-xs">لا توجد مواد متوفرة حالياً.</div>`;
                return;
            }

            document.getElementById('categories-wrapper').classList.remove('hidden');
            generateCategoryTabs();
            displayProducts(products);
        }

        function generateCategoryTabs() {
            const container = document.getElementById('categories-container');
            const categories = ["الكل", ...new Set(products.map(p => p.category).filter(Boolean))];
            container.innerHTML = '';
            categories.forEach(cat => {
                const isActive = cat === selectedCategory;
                const btnClass = isActive 
                    ? "bg-orange-500 text-white font-black px-3.5 py-1.5 rounded-xl text-xs whitespace-nowrap shadow-sm"
                    : "bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold px-3.5 py-1.5 rounded-xl text-xs whitespace-nowrap";
                container.innerHTML += `<button onclick="selectCategory('${cat}')" class="${btnClass}">${cat}</button>`;
            });
        }

        function selectCategory(category) {
            selectedCategory = category;
            generateCategoryTabs();
            filterProducts(document.getElementById('global-search-input').value.trim().toLowerCase());
        }

        function filterProducts(searchQuery = '') {
            const filtered = products.filter(p => {
                const matchesCategory = (selectedCategory === "الكل" || p.category === selectedCategory);
                const matchesSearch = (!searchQuery || p.name.toLowerCase().includes(searchQuery));
                return matchesCategory && matchesSearch;
            });
            displayProducts(filtered);
        }

        // تم إصلاح دالة البناء لإرسال روابط الميديا بشكل نصي ناصع ومعزول للمودال يمنع كسر الكود
        async function displayProducts(productsList) {
            const productsContainer = document.getElementById('products');
            if(productsList.length === 0) {
                productsContainer.innerHTML = `<div class="col-span-full py-12 text-center text-slate-400 text-xs">لا توجد مواد مطابقة للفرز.</div>`;
                return;
            }

            productsContainer.innerHTML = ''; 
            for (let p of productsList) {
                let mediaElementHtml = '';

                if (p.media_type === 'video' && p.video_file_id) {
                    const videoUrl = await getTelegramImageUrl(p.video_file_id);
                    if (videoUrl) {
                        // تم إصلاح حدث onclick وإضافة دالة تمرير آمنة تمنع كسر الجافا سكريبت بسبب الروابط
                        mediaElementHtml = `
                            <div class="w-20 h-20 relative rounded-xl overflow-hidden bg-slate-950 cursor-pointer shadow-xs shrink-0" onclick="triggerMediaPlay('${videoUrl}', 'video')">
                                <video src="${videoUrl}" class="w-full h-full object-cover" muted playsinline autoplay loop></video>
                                <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                                    <div class="w-6 h-6 bg-white/90 text-slate-900 rounded-full flex items-center justify-center shadow shadow-md pl-0.5 animate-pulse">
                                        <i class="fa-solid fa-play text-[8px]"></i>
                                    </div>
                                </div>
                            </div>`;
                    }
                } 
                if (!mediaElementHtml && p.image_file_id) {
                    const imageUrl = await getTelegramImageUrl(p.image_file_id);
                    if (imageUrl) {
                        mediaElementHtml = `<img src="${imageUrl}" class="w-20 h-20 object-cover rounded-xl cursor-pointer shrink-0 shadow-xs" alt="${p.name}" onclick="triggerMediaPlay('${imageUrl}', 'image')">`;
                    }
                }
                if (!mediaElementHtml) {
                    mediaElementHtml = `<div class="w-20 h-20 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center text-base shrink-0"><i class="fa-solid fa-cookie-bite"></i></div>`;
                }

                productsContainer.innerHTML += `
                <div class="bg-white rounded-2xl border border-slate-150 p-3 flex items-center justify-between gap-3 shadow-xs">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        ${mediaElementHtml}
                        <div class="min-w-0">
                            <h4 class="font-black text-xs text-slate-900 line-clamp-1">${p.name}</h4>
                            <p class="text-[11px] text-orange-600 font-black mt-1">${p.price.toLocaleString()} د.ع</p>
                        </div>
                    </div>
                    <button onclick="addToCart('${p.id}','${p.name}',${p.price}, '${p.merchant_id}')" class="h-9 w-9 rounded-xl bg-orange-500 hover:bg-orange-600 text-white flex items-center justify-center shadow-sm cursor-pointer transition active:scale-90 shrink-0">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>`;
            }
        }

        // دالة تفعيل الميديا المصلحة والآمنة 100%
        function triggerMediaPlay(url, type) {
            openMediaModal(url, type);
        }

        // =====================
        // 6. MULTI-STORE CART SYSTEM (المقيد)
        // =====================
        function addToCart(id, name, price, merchantId){
            let storeData = stores.find(s => s.id === merchantId);
            let storeName = storeData ? storeData.store_name : "متجر مجهول";
            const currentUniqueStores = [...new Set(cart.map(item => item.merchant_id))];

            if (currentUniqueStores.length >= 2 && !currentUniqueStores.includes(merchantId)) {
                alert("⚠️ عذراً، يمكنك الطلب من متجرين كحد أقصى في الفاتورة المشتركة لضمان الجودة وسرعة التوصيل.");
                return;
            }

            if (currentUniqueStores.length === 1 && !currentUniqueStores.includes(merchantId)) {
                let firstStore = stores.find(s => s.id === currentUniqueStores[0]);
                let secondStore = storeData;

                if (firstStore && secondStore) {
                    let lat1 = firstStore.lat || firstStore.latitude; let lon1 = firstStore.lng || firstStore.longitude;
                    let lat2 = secondStore.lat || secondStore.latitude; let lon2 = secondStore.lng || secondStore.longitude;

                    if (lat1 && lon1 && lat2 && lon2) {
                        let distanceBetweenStores = calculateHaversineDistance(lat1, lon1, lat2, lon2);
                        if (distanceBetweenStores > 1.0) {
                            alert(`⚠️ تعذر الدمج المشترك!\nالمسافة الجغرافية بين "${firstStore.store_name}" و "${secondStore.store_name}" تبلغ (${distanceBetweenStores.toFixed(2)} كم).\nيجب اختيار متاجر قريبة (أقل من 1 كم الفاصل بينهما) لتأمين الدليفري الذكي التنافسي.`);
                            return;
                        }
                    }
                }
            }

            let item = cart.find(x => x.product_id === id);
            if(item) {
                item.qty++; item.total = item.price * item.qty;
            } else {
                cart.push({product_id: id, name, price, qty: 1, total: price, merchant_id: merchantId, merchant_name: storeName});
            }
            renderCart();
            updateFloatingCartButtonVisibility();
        }

        function changeQty(id, change) {
            let item = cart.find(x => x.product_id === id);
            if(item) {
                item.qty += change; item.total = item.price * item.qty;
                if(item.qty <= 0) cart = cart.filter(x => x.product_id !== id);
            }
            renderCart();
            updateFloatingCartButtonVisibility();
        }

        function updateFloatingCartButtonVisibility() {
            const btn = document.getElementById('floating-cart-btn');
            const totalItems = cart.reduce((a, b) => a + b.qty, 0);
            if(totalItems > 0) btn.classList.remove('hidden'); else btn.classList.add('hidden');
        }

        function renderCart(){
            const cartContainer = document.getElementById('cart-items-by-store');
            const totalItems = cart.reduce((a, b) => a + b.qty, 0);
            const subtotalPrice = cart.reduce((a, b) => a + b.price * b.qty, 0);

            document.getElementById('subtotal-price').innerText = subtotalPrice.toLocaleString();
            document.getElementById('total-price').innerText = (subtotalPrice + currentDeliveryFee).toLocaleString();
            document.getElementById("cart-floating-badge").innerText = totalItems;

            if(cart.length === 0) {
                cartContainer.innerHTML = `<div class="text-center py-8 text-gray-400 text-xs font-semibold">السلة فارغة، أضف مواد من المنيو!</div>`;
                return;
            }

            const groupedCart = {};
            cart.forEach(item => {
                if(!groupedCart[item.merchant_id]) {
                    groupedCart[item.merchant_id] = { storeName: item.merchant_name, items: [] };
                }
                groupedCart[item.merchant_id].items.push(item);
            });

            cartContainer.innerHTML = '';
            for(let mId in groupedCart) {
                let storeGroup = groupedCart[mId];
                let blockHtml = `
                <div class="border border-slate-200 rounded-2xl bg-slate-50 p-3 space-y-2">
                    <div class="flex items-center gap-1.5 text-xs font-bold text-gray-900 border-b border-slate-200/50 pb-1.5">
                        <i class="fa-solid fa-shop text-orange-500"></i>
                        <span>من متجر: ${storeGroup.storeName}</span>
                    </div>
                    <div class="space-y-2">`;

                storeGroup.items.forEach(c => {
                    blockHtml += `
                    <div class="flex items-center justify-between bg-white p-2.5 rounded-xl border border-slate-150 shadow-2xs">
                        <div class="min-w-0 flex-1 pl-1">
                            <div class="font-bold text-slate-800 text-xs line-clamp-1">${c.name}</div>
                            <div class="text-[10px] text-orange-600 font-black mt-0.5">${c.total.toLocaleString()} د.ع</div>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <button onclick="changeQty('${c.product_id}',-1)" class="w-5 h-5 rounded-full bg-slate-100 flex items-center justify-center text-slate-600"><i class="fa-solid fa-minus text-[8px]"></i></button>
                            <div class="font-black text-xs w-4 text-center">${c.qty}</div>
                            <button onclick="changeQty('${c.product_id}',1)" class="w-5 h-5 rounded-full bg-orange-500 text-white flex items-center justify-center"><i class="fa-solid fa-plus text-[8px]"></i></button>
                        </div>
                    </div>`;
                });

                blockHtml += `</div></div>`;
                cartContainer.innerHTML += blockHtml;
            }
        }

        // =====================
        // 7. MODALS WINDOWS & LIGHTBOX
        // =====================
        function openCartModal() {
            renderCart();
            if(customerLat && customerLng) { processGeographicalDelivery(); }
            const modal = document.getElementById('cart-modal');
            const container = document.getElementById('cart-modal-container');
            modal.classList.remove('pointer-events-none', 'opacity-0');
            container.classList.remove('translate-x-full');
        }

        function closeCartModal() {
            const modal = document.getElementById('cart-modal');
            const container = document.getElementById('cart-modal-container');
            modal.classList.add('opacity-0', 'pointer-events-none');
            container.classList.add('translate-x-full');
        }

        function openMediaModal(url, type) {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('modal-content');
            
            // إصلاح شامل للمشغل ليعمل بصوت كامل وعالي وتأكيد التجاوبية للـ Lightbox
            if (type === 'video') {
                content.innerHTML = `<video src="${url}" class="w-full h-full object-contain rounded-2xl shadow-xl" bg-black controls autoplay></video>`;
            } else {
                content.innerHTML = `<img src="${url}" class="w-full h-full object-contain rounded-2xl" alt="معاينة الفاتورة والمادة">`;
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeMediaModal() {
            const modal = document.getElementById('media-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                document.getElementById('modal-content').innerHTML = ''; // تفريغ الذاكرة لإيقاف صوت الفيديو فوراً عند الإغلاق
            }, 300);
        }

        // =====================
        // 8. GEOLOCATION PRICING
        // =====================
        function getFeeByKilometers(km) {
            if (km <= 1.5) return 2000;   
            if (km <= 3) return 3000;   
            if (km <= 7) return 4000;  
            return 5000;                
        }

        function processGeographicalDelivery() {
            if (!customerLat || !customerLng || cart.length === 0) return;

            const uniqueMerchantIds = [...new Set(cart.map(item => item.merchant_id))];
            let maxDistance = 0; let distanceReportHtml = '';

            uniqueMerchantIds.forEach(mId => {
                let merchant = stores.find(s => s.id === mId);
                if(merchant) {
                    let sLat = merchant.lat || merchant.latitude; let sLng = merchant.lng || merchant.longitude;
                    if(sLat && sLng) {
                        let dist = calculateHaversineDistance(customerLat, customerLng, sLat, sLng);
                        if(dist > maxDistance) maxDistance = dist;
                        distanceReportHtml += `<div>📍 مسافة وجبة ${merchant.store_name}: ${dist.toFixed(1)} كم</div>`;
                    }
                }
            });

            let baseFee = getFeeByKilometers(maxDistance);
            let extraStoresCount = uniqueMerchantIds.length - 1;
            currentDeliveryFee = baseFee + (extraStoresCount * 1500);

            document.getElementById('delivery-fee-display').innerText = `${currentDeliveryFee.toLocaleString()} د.ع`;
            
            const distanceInfo = document.getElementById('distance-info');
            distanceInfo.classList.remove('hidden');
            
            let storeDistanceText = "";
            if (uniqueMerchantIds.length === 2) {
                let store1 = stores.find(s => s.id === uniqueMerchantIds[0]);
                let store2 = stores.find(s => s.id === uniqueMerchantIds[1]);
                let distBetween = calculateHaversineDistance(
                    store1.lat || store1.latitude, store1.lng || store1.longitude,
                    store2.lat || store2.latitude, store2.lng || store2.longitude
                );
                storeDistanceText = `<div class="text-[10px] text-orange-600 font-bold mt-1">✨ المتاجر المزدوجة تبعد عن بعضها: ${distBetween.toFixed(2)} كم فقط (نطاق آمن وموثوق)!</div>`;
            }

            distanceInfo.innerHTML = `
                <div class="font-bold flex items-center gap-1 text-slate-700 mb-1"><i class="fa-solid fa-route text-orange-500"></i> تفاصيل الفاتورة الجغرافية:</div>
                ${distanceReportHtml} ${storeDistanceText}
            `;
            renderCart(); 
        }

        function requestUserLocation() {
            document.getElementById('location-btn-text').innerText = "جاري الاتصال بالأقمار الجغرافية...";
            if (tg?.LocationManager?.isInited) {
                tg.LocationManager.getLocation(function(data) {
                    if (data?.latitude) {
                        customerLat = data.latitude; customerLng = data.longitude;
                        updateLocationSuccess();
                    } else { fallbackToBrowserGeolocation(); }
                });
            } else { fallbackToBrowserGeolocation(); }
        }

        function fallbackToBrowserGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    customerLat = pos.coords.latitude; customerLng = pos.coords.longitude;
                    updateLocationSuccess();
                }, () => {
                    document.getElementById('location-btn-text').innerText = "فشل التقاط الـ GPS";
                });
            }
        }

        function updateLocationSuccess() {
            document.getElementById('location-btn').className = "w-full flex items-center justify-center gap-2 bg-emerald-50 text-emerald-700 font-bold py-2.5 px-4 rounded-xl text-xs border border-emerald-200 transition shadow-sm";
            document.getElementById('location-btn-text').innerHTML = `<i class="fa-solid fa-circle-check text-emerald-600"></i> تم تثبيت موقع التوصيل بنجاح!`;
            processGeographicalDelivery();
        }

        // =====================
        // 9. CHECKOUT & SEND
        // =====================
        async function checkout(){
            if(cart.length === 0) return alert("⚠️ السلة فارغة تماماً!");
            if(!customerLat || !customerLng) return alert("⚠️ يرجى تثبيت موقع التسليم لحساب أجور التوصيل المزدوج المدمج!");

            const subtotalPrice = cart.reduce((a, b) => a + b.price * b.qty, 0);
            const generatedOrderNumber = Math.floor(100000 + Math.random() * 900000); 
            const uniqueMerchantIds = [...new Set(cart.map(item => item.merchant_id))];

            const newOrder = {
                merchant_id: uniqueMerchantIds[0], 
                customer_telegram_id: customerTelegramId,
                customer_phone: customerPhone,
                address: `http://maps.google.com/?q=${customerLat},${customerLng}`,
                customer_lat: customerLat, customer_lng: customerLng,
                total_amount: subtotalPrice + currentDeliveryFee, 
                delivery_fee: currentDeliveryFee, 
                order_items: JSON.stringify(cart), 
                notes: document.getElementById('order-notes').value || "",
                status: "pending", order_number: generatedOrderNumber
            };

            try {
                let { error } = await db.from('orders').insert([newOrder]);
                if (error) throw error;

                alert(`🎉 تم ترحيل وإرسال طلبك المزدوج بنجاح! رقم الفاتورة الموحدة المضمونة: ${generatedOrderNumber}`);
                cart = []; currentDeliveryFee = 0; closeCartModal(); backToStores(); renderCart();
                if(tg) tg.close();
            } catch (err) {
                alert("❌ حدث خطأ داخلي في الخادم أثناء معالجة الفاتورة.");
            }
        }

        loadStores();
    </script>
</body>
</html>
